<!DOCTYPE html>
<html>
<head>
    <title>测试用户管理API</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        pre { background: #f5f5f5; padding: 10px; border-radius: 5px; }
        button { padding: 10px 20px; background: #0070f3; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #0051cc; }
    </style>
</head>
<body>
    <h1>测试用户管理API</h1>
    
    <div>
        <h2>1. 测试登录</h2>
        <button onclick="testLogin()">测试管理员登录</button>
        <div id="login-result"></div>
    </div>
    
    <div>
        <h2>2. 测试获取用户列表</h2>
        <button onclick="testGetUsers()">获取用户列表</button>
        <div id="users-result"></div>
    </div>
    
    <div>
        <h2>3. 当前localStorage状态</h2>
        <button onclick="showLocalStorage()">显示localStorage</button>
        <div id="storage-result"></div>
    </div>
    
    <script>
        async function testLogin() {
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: 'admin',
                        password: 'admin123'
                    })
                });
                
                const data = await response.json();
                document.getElementById('login-result').innerHTML = 
                    `<pre>${JSON.stringify(data, null, 2)}</pre>`;
                
                if (data.success) {
                    // 模拟前端登录逻辑
                    localStorage.setItem('user', JSON.stringify(data.user));
                    alert('登录成功！用户信息已保存到localStorage');
                }
            } catch (error) {
                document.getElementById('login-result').innerHTML = 
                    `<pre style="color: red">错误: ${error.message}</pre>`;
            }
        }
        
        async function testGetUsers() {
            try {
                const response = await fetch('/api/admin/users');
                const data = await response.json();
                document.getElementById('users-result').innerHTML = 
                    `<pre>找到 ${data.length} 个用户:\n${JSON.stringify(data, null, 2)}</pre>`;
            } catch (error) {
                document.getElementById('users-result').innerHTML = 
                    `<pre style="color: red">错误: ${error.message}</pre>`;
            }
        }
        
        function showLocalStorage() {
            const user = localStorage.getItem('user');
            document.getElementById('storage-result').innerHTML = 
                `<pre>user: ${user || '未设置'}</pre>`;
        }
    </script>
</body>
</html>
