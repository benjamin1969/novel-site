name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:  # 允许手动触发

env:
  NODE_VERSION: '20'  # 升级到Node.js 20，兼容性更好
  NEXT_PUBLIC_API_URL: 'https://novel-platform-api.sunlongyun1030.workers.dev'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'  # 强制使用Node.js 24

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史记录以进行更好的缓存
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
        env:
          CI: true
      
      - name: Build Next.js application
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ env.NEXT_PUBLIC_API_URL }}
          NODE_ENV: production
      
      - name: Verify build output
        run: |
          echo "✅ 构建完成，检查输出目录..."
          if [ -d ".next" ]; then
            echo "📁 找到.next构建目录"
            ls -la .next/
            
            # 检查是否有standalone目录
            if [ -d ".next/standalone" ]; then
              echo "📁 找到standalone目录，使用standalone模式"
              echo "DEPLOY_DIR=.next/standalone" >> $GITHUB_ENV
            else
              echo "📁 使用标准.next目录"
              echo "DEPLOY_DIR=.next" >> $GITHUB_ENV
            fi
            
            echo "部署目录: $DEPLOY_DIR"
          else
            echo "❌ 未找到.next目录，检查构建配置"
            exit 1
          fi
      
      - name: Deploy to Cloudflare Pages
        id: deployment
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: novel-platform
          directory: ${{ env.DEPLOY_DIR || '.next' }}  # 使用动态部署目录
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref_name }}
          workingDirectory: '.'
      
      - name: Deployment status
        run: |
          echo "🎉 部署完成！"
          echo "部署ID: ${{ steps.deployment.outputs.deployment-id }}"
          echo "部署URL: ${{ steps.deployment.outputs.deployment-url }}"
          echo "预览URL: ${{ steps.deployment.outputs.preview-url }}"
          echo "环境: ${{ steps.deployment.outputs.environment }}"
  
  test-api:
    runs-on: ubuntu-latest
    needs: build-and-deploy
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    
    steps:
      - name: Wait for deployment propagation
        run: |
          echo "⏳ 等待部署传播到CDN边缘节点..."
          echo "Cloudflare Pages部署后需要30-60秒才能在全球生效"
          sleep 45
          echo "✅ 等待完成，开始测试..."
      
      - name: Test Cloudflare Worker API
        run: |
          echo "🔍 测试Cloudflare Worker API连接..."
          API_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://novel-platform-api.sunlongyun1030.workers.dev/")
          echo "API状态码: $API_STATUS"
          
          if [ "$API_STATUS" = "200" ]; then
            echo "✅ API连接正常"
          else
            echo "⚠️  API连接异常，状态码: $API_STATUS"
          fi
      
      - name: Test website deployment
        run: |
          echo "🔍 测试网站部署..."
          
          # 测试主网站，最多重试3次
          MAX_RETRIES=3
          RETRY_COUNT=0
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            MAIN_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://novel-platform-f3a.pages.dev/")
            echo "测试 $((RETRY_COUNT+1))/$MAX_RETRIES: 状态码: $MAIN_STATUS"
            
            if [ "$MAIN_STATUS" = "200" ]; then
              echo "✅ 网站部署正常"
              exit 0
            fi
            
            RETRY_COUNT=$((RETRY_COUNT+1))
            if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
              echo "⏳ 等待10秒后重试..."
              sleep 10
            fi
          done
          
          echo "⚠️  网站部署异常，最终状态码: $MAIN_STATUS"
          echo "💡 提示: 这可能是因为CDN缓存延迟，网站可能稍后自动恢复"