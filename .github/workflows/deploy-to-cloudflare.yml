name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:  # 允许手动触发

env:
  NODE_VERSION: '18'
  NEXT_PUBLIC_API_URL: 'https://novel-platform-api.sunlongyun1030.workers.dev'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pages: write
      id-token: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史记录以进行更好的缓存
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
        env:
          CI: true
      
      - name: Build Next.js application
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ env.NEXT_PUBLIC_API_URL }}
          NODE_ENV: production
      
      - name: Verify build output
        run: |
          echo "✅ 构建完成，检查输出目录..."
          ls -la .next/standalone/ || echo "⚠️  .next/standalone 目录不存在"
          ls -la .next/standalone/.next/ || echo "⚠️  .next/.next 目录不存在"
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .  # 上传整个项目，Cloudflare Pages会处理构建输出
      
      - name: Deploy to Cloudflare Pages
        id: deployment
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: novel-platform
          directory: .  # 上传整个项目
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref_name }}
          workingDirectory: '.'
      
      - name: Deployment status
        run: |
          echo "🎉 部署完成！"
          echo "部署ID: ${{ steps.deployment.outputs.deployment-id }}"
          echo "部署URL: ${{ steps.deployment.outputs.deployment-url }}"
          echo "预览URL: ${{ steps.deployment.outputs.preview-url }}"
          echo "环境: ${{ steps.deployment.outputs.environment }}"
  
  test-api:
    runs-on: ubuntu-latest
    needs: build-and-deploy
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    
    steps:
      - name: Test Cloudflare Worker API
        run: |
          echo "🔍 测试Cloudflare Worker API连接..."
          API_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://novel-platform-api.sunlongyun1030.workers.dev/")
          echo "API状态码: $API_STATUS"
          
          if [ "$API_STATUS" = "200" ]; then
            echo "✅ API连接正常"
          else
            echo "⚠️  API连接异常，状态码: $API_STATUS"
          fi
      
      - name: Test website deployment
        run: |
          echo "🔍 测试网站部署..."
          # 等待几秒让部署生效
          sleep 10
          
          # 测试主网站
          MAIN_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://novel-platform-f3a.pages.dev/")
          echo "主网站状态码: $MAIN_STATUS"
          
          if [ "$MAIN_STATUS" = "200" ]; then
            echo "✅ 网站部署正常"
          else
            echo "⚠️  网站部署异常，状态码: $MAIN_STATUS"
          fi