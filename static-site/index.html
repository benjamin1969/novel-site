<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小学生小说创作平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Arial', sans-serif; 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        h1 {
            color: #4a6fa5;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
        }
        .intro {
            text-align: center;
            color: #666;
            margin-bottom: 40px;
            line-height: 1.6;
        }
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .feature {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #4a6fa5;
        }
        .feature h3 {
            color: #4a6fa5;
            margin-bottom: 10px;
        }
        .buttons {
            text-align: center;
            margin-top: 30px;
        }
        .btn {
            display: inline-block;
            background: #4a6fa5;
            color: white;
            padding: 12px 30px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            margin: 0 10px;
            transition: all 0.3s;
        }
        .btn:hover {
            background: #3a5a8a;
            transform: translateY(-2px);
        }
        .coming-soon {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            background: #e8f4fd;
            border-radius: 10px;
            color: #2c5282;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 小学生小说创作平台</h1>
        
        <div class="intro">
            <p>欢迎来到专为小学生设计的简约小说创作平台！</p>
            <p>在这里，你可以创作属于自己的故事，阅读其他同学的作品。</p>
        </div>
        
        <div class="features">
            <div class="feature">
                <h3>✏️ 轻松创作</h3>
                <p>简单的编辑器，适合小学生使用，专注写作内容。</p>
            </div>
            <div class="feature">
                <h3>📖 阅读分享</h3>
                <p>阅读其他同学创作的有趣故事，互相学习鼓励。</p>
            </div>
            <div class="feature">
                <h3>🎨 简约设计</h3>
                <p>干净整洁的界面，无复杂装饰，保护视力。</p>
            </div>
        </div>
        
        <div class="buttons">
            <a href="#" class="btn">开始阅读</a>
            <a href="#" class="btn">注册账号</a>
        </div>
        
        <div class="coming-soon">
            <h3>🚀 完整功能即将上线！</h3>
            <p>用户注册、小说创作、章节管理、评论系统等功能正在开发中...</p>
            <p style="margin-top: 10px; font-size: 0.9em;">当前版本: 展示版 | 开发中</p>
        </div>
    </div>
    
    <script>
        // 简单交互
        document.querySelectorAll('.btn').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                alert('功能即将上线，敬请期待！');
            });
        });
    </script>
</body>
</html>
